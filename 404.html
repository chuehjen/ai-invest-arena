<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>AI 投资竞赛 · 重定向</title>
<script>
  // GitHub Pages 子路径部署 SPA 兜底：
  // 访问 /ai-invest-arena/xxx 时 Pages 返回 404.html，
  // 此脚本把 path+query 存入 sessionStorage 然后跳回根路径，
  // 再由 bundle 里的 historyApiFallback 接管。
  (function () {
    var seg = location.pathname.split('/').filter(Boolean);
    var basePath = '/' + (seg[0] || 'ai-invest-arena') + '/';
    sessionStorage.setItem('gh-redirect', location.pathname + location.search + location.hash);
    if (location.pathname !== basePath) {
      location.replace(basePath);
    }
  })();
</script>
</head>
<body>
<noscript>
  <p>请启用 JavaScript 或访问 <a href="/ai-invest-arena/">/ai-invest-arena/</a>。</p>
</noscript>
</body>
</html>
