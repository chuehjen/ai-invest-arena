# 每交易日美东收盘后自动生成「明日调仓提示词」并推送钉钉。
#
# 触发时机（NY 时区）：
#   - 每周一至周五 16:30 ET（收盘后 30 分钟，等 EOD 数据入库）
#   - 每周日 20:00 CST（= NY 07:00 Mon）额外兜底一次，防止周一开盘前长假爆胎
#
# 触发链（任一成功即结束当日）：
#   1. GH schedule cron '30 20 * * 1-5'   NY 16:30 收盘后主推
#   2. GH schedule cron '30 21 * * 1-5'   NY 17:30 一小时后二次兜底
#   3. daily-prompts-heartbeat.yml         CST 07:30 / 08:00 三次兜底
#
# 幂等：
#   1. concurrency.group 串行化，同一 target 交易日不并发
#   2. prompts/<target>/ 已 5 份齐全 → daily_run.py 内部跳过 fetch + generate
#   3. 跑完把 prices/<prev>.json commit 回 main，让后续 cron 命中幂等
#
# 语义换代：
#   - 旧版：target = prev_trading_day(NY today)  → 拉「刚过去这天」的价格并按当天推
#   - 新版：target = today_or_next(NY today)     → 拉「target 上一日」价格，为「target 调仓」做准备
#           收盘后跑时 NY today == target，与旧版行为一致；
#           但在长假前跑（比如周五收盘后 target=下周一）时，价格与 target 天然错位，正是我们想要的。
name: Daily Prompts

on:
  schedule:
    # NY 16:30 主推 (夏令时 CST 04:30 / 冬令时 CST 05:30)
    - cron: '30 20 * * 1-5'
    # NY 17:30 二次兜底
    - cron: '30 21 * * 1-5'
  workflow_dispatch:
    inputs:
      target_date:
        description: '强制指定 target 交易日 YYYY-MM-DD（默认 NY today or next）'
        required: false
        type: string
      force:
        description: '强制重跑（忽略幂等检查）'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  # 同一 target 交易日的多次触发（cron/兜底/手动）都收敛到同一 group，前一个跑完幂等秒退后续
  group: daily-prompts-${{ github.event.inputs.target_date || github.workflow }}
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Resolve target / prev trading day
        id: dates
        run: |
          if [ -n "${{ inputs.target_date }}" ]; then
            TARGET="${{ inputs.target_date }}"
          else
            NY_TODAY=$(TZ='America/New_York' date '+%Y-%m-%d')
            TARGET=$(python3 automation/scripts/target_trading_day.py --mode today "$NY_TODAY")
          fi
          PREV=$(python3 automation/scripts/target_trading_day.py --mode prev "$TARGET")
          echo "target=$TARGET" >> $GITHUB_OUTPUT
          echo "prev=$PREV" >> $GITHUB_OUTPUT
          echo "Target trading day: $TARGET (prev: $PREV)"

      - name: Idempotency check (skip if prompts complete)
        id: idem
        run: |
          TARGET="${{ steps.dates.outputs.target }}"
          if [ "${{ inputs.force }}" = "true" ]; then
            echo "Force flag set, will run"
            echo "should_skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          DIR="automation/prompts/$TARGET"
          NEEDED="beth-kindig.md cathie-wood.md doubao.md qwen.md serenity.md"
          MISSING=""
          for f in $NEEDED; do
            [ -f "$DIR/$f" ] || MISSING="$MISSING $f"
          done
          if [ -z "$MISSING" ]; then
            echo "All 5 prompt files exist for $TARGET, skipping"
            echo "should_skip=true" >> $GITHUB_OUTPUT
          else
            echo "Missing prompt files:$MISSING"
            echo "should_skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure env
        if: steps.idem.outputs.should_skip != 'true'
        env:
          TWELVE_DATA_KEY: ${{ secrets.TWELVE_DATA_KEY }}
          DINGBOT_WEBHOOK: ${{ secrets.DINGBOT_WEBHOOK }}
        run: |
          cat > .env <<EOF
          TWELVE_DATA_KEY=${TWELVE_DATA_KEY}
          DINGBOT_WEBHOOK=${DINGBOT_WEBHOOK}
          EOF

      - name: Fetch prices + generate prompts + push DingTalk
        if: steps.idem.outputs.should_skip != 'true'
        run: |
          cd automation/scripts
          python daily_run.py prompts \
            --target-date "${{ steps.dates.outputs.target }}" \
            --prev "${{ steps.dates.outputs.prev }}" \
            ${{ inputs.force == true && '--force' || '' }}

      - name: Commit prices + prompts back to main
        if: steps.idem.outputs.should_skip != 'true'
        run: |
          TARGET="${{ steps.dates.outputs.target }}"
          PREV="${{ steps.dates.outputs.prev }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          [ -f "automation/prices/$PREV.json" ] && git add "automation/prices/$PREV.json" || true
          [ -d "automation/prompts/$TARGET" ] && git add "automation/prompts/$TARGET" || true
          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          git commit -m "chore(auto): prices $PREV + prompts $TARGET [skip ci]"
          # 最多 3 次重试
          for i in 1 2 3; do
            if git push origin HEAD:main; then
              echo "Pushed"
              exit 0
            fi
            echo "Push attempt $i failed, rebasing..."
            git pull --rebase origin main || true
            sleep $((i * 2))
          done
        continue-on-error: true

      - name: Upload artifacts
        if: always() && steps.idem.outputs.should_skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: prompts-${{ github.run_id }}
          path: |
            automation/prices/*.json
            automation/prompts/**/*.md
          retention-days: 7

      - name: Notify failure via DingTalk
        if: failure() && env.DINGBOT_WEBHOOK
        env:
          DINGBOT_WEBHOOK: ${{ secrets.DINGBOT_WEBHOOK }}
        run: |
          curl -s -X POST "$DINGBOT_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"msgtype\": \"text\",
              \"text\": {\"content\": \"[情报采集] ❌ Daily Prompts workflow 失败 (target=${{ steps.dates.outputs.target }})：https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}
            }"
