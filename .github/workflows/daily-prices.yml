# 每日 CST 20:17/20:47 自动（含外部 launchd 主触发 CST 20:00）：
#   1. 用 Twelve Data 拉前一交易日收盘价
#   2. 生成 5 份提示词（3 大师 + 豆包 + 千问）
#   3. 推送豆包 + 千问 2 份到钉钉群「大仁哥」
#
# 触发链（任一成功即终止）：
#   - launchd (CST 20:00) → gh workflow run    [主，最稳]
#   - GH schedule cron '17 12' (CST 20:17)      [兜底 1，错峰]
#   - GH schedule cron '47 12' (CST 20:47)      [兜底 2，二次错峰]
#
# 防重复机制（三保险）：
#   1. concurrency.group 串行化：同一目标交易日只允许 1 个 in-flight
#   2. Idempotency check：用 holidays.prev_trading_day 计算真实目标交易日，
#      若 automation/prices/<prev>.json 已存在则 should_skip=true，秒退
#   3. 跑完后把 prices/<date>.json commit 回 main，让后续 cron 能命中幂等
#
# 美股节假日自动跳过（fetch_prices.py 内部调用 holidays.py 校验）。
name: Daily Prices + Prompts

on:
  schedule:
    # 错峰避开整点/半点高峰；两次冗余兜底
    - cron: '17 12 * * 1-5'   # CST 20:17 主兜底
    - cron: '47 12 * * 1-5'   # CST 20:47 二次兜底
  workflow_dispatch:
    inputs:
      date:
        description: 'Override date YYYY-MM-DD（默认用今天）'
        required: false
        type: string
      force:
        description: '强制重跑（忽略幂等检查）'
        required: false
        type: boolean
        default: false

permissions:
  contents: write   # 跑完要把 prices/<date>.json commit 回 main

# 同一交易日的多次触发会排队串行执行；前一个跑完写好 prices/<date>.json，
# 后一个进来时幂等检查会命中 should_skip=true 秒退。
# key 用 NY 当天日期，launchd/cron1/cron2/手动触发同日都收敛到一个 group。
concurrency:
  group: daily-prices-${{ github.event.inputs.date || github.workflow }}-ny-day
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Idempotency check (skip if previous trading day's prices already exist)
        id: idem
        run: |
          # 计算「目标交易日」= 用户指定 / 否则 NY 今天的 prev_trading_day
          # 复用仓库内 holidays.py，避免硬编码节假日
          if [ -n "${{ inputs.date }}" ]; then
            TARGET_DATE="${{ inputs.date }}"
          else
            NY_TODAY=$(TZ='America/New_York' date '+%Y-%m-%d')
            TARGET_DATE=$(python3 automation/scripts/target_trading_day.py "$NY_TODAY")
          fi
          echo "target_date=$TARGET_DATE" >> $GITHUB_OUTPUT
          echo "Target trading day: $TARGET_DATE"

          if [ "${{ inputs.force }}" = "true" ]; then
            echo "Force flag set, will run"
            echo "should_skip=false" >> $GITHUB_OUTPUT
          elif [ -f "automation/prices/$TARGET_DATE.json" ]; then
            echo "automation/prices/$TARGET_DATE.json already exists -- skipping duplicate run"
            echo "should_skip=true" >> $GITHUB_OUTPUT
          else
            echo "automation/prices/$TARGET_DATE.json missing -- will fetch"
            echo "should_skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python
        if: steps.idem.outputs.should_skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure env
        if: steps.idem.outputs.should_skip != 'true'
        env:
          TWELVE_DATA_KEY: ${{ secrets.TWELVE_DATA_KEY }}
          DINGBOT_WEBHOOK: ${{ secrets.DINGBOT_WEBHOOK }}
        run: |
          cat > .env <<EOF
          TWELVE_DATA_KEY=${TWELVE_DATA_KEY}
          DINGBOT_WEBHOOK=${DINGBOT_WEBHOOK}
          EOF

      - name: Fetch prices + generate prompts
        if: steps.idem.outputs.should_skip != 'true'
        run: |
          cd automation/scripts
          if [ -n "${{ inputs.date }}" ]; then
            python daily_run.py prompts --date "${{ inputs.date }}"
          else
            python daily_run.py prompts
          fi

      - name: Commit prices back to main (so later cron runs hit idempotency)
        if: steps.idem.outputs.should_skip != 'true'
        run: |
          TARGET="automation/prices/${{ steps.idem.outputs.target_date }}.json"
          if [ ! -f "$TARGET" ]; then
            echo "$TARGET not generated, skip commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$TARGET"
          if git diff --cached --quiet; then
            echo "No price changes to commit"
            exit 0
          fi
          git commit -m "chore(prices): auto-fetched ${{ steps.idem.outputs.target_date }} [skip ci]"
          # 最多 3 次重试，应对并发推送冲突
          for i in 1 2 3; do
            if git push origin HEAD:main; then
              echo "Pushed prices to main"
              exit 0
            fi
            echo "Push attempt $i failed, rebasing..."
            git pull --rebase origin main || true
            sleep $((i * 2))
          done
        continue-on-error: true

      - name: Upload artifacts
        if: always() && steps.idem.outputs.should_skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: prompts-${{ github.run_id }}
          path: |
            automation/prices/*.json
            automation/prompts/**/*.md
          retention-days: 7

      - name: Notify failure via DingTalk
        if: failure() && env.DINGBOT_WEBHOOK
        env:
          DINGBOT_WEBHOOK: ${{ secrets.DINGBOT_WEBHOOK }}
        run: |
          curl -s -X POST "$DINGBOT_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d '{
              "msgtype": "text",
              "text": {"content": "[情报采集] ❌ AI 投资竞赛 Daily workflow 失败，请查看 GitHub Actions 日志：https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"}
            }'
