# Deploy 静态站到 GitHub Pages（子路径：/ai-invest-arena/）
# 触发：push 到 main 分支，或手动 workflow_dispatch
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'webpack.config.js'
      - 'index.html'
      - 'tsconfig.json'
  workflow_dispatch:

# 并发控制：同一 branch 只跑最新一次，旧的取消
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm install --production=false
        env:
          NODE_ENV: development

      - name: Debug node_modules
        run: |
          echo "=== node_modules/.bin/webpack ==="
          ls -la node_modules/.bin/webpack 2>&1 || echo "NOT FOUND"
          echo "=== npm ls webpack ==="
          npm ls webpack 2>&1 | head -10
          echo "=== node -e require webpack ==="
          node -e "console.log(require.resolve('webpack'))" 2>&1 || echo "RESOLVE FAILED"
          echo "=== NODE_ENV ==="
          echo "$NODE_ENV"

      - name: Build
        env:
          NODE_ENV: production
          GITHUB_PAGES: 'true'
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
